services:
  - type: web
    name: nova-ai-backend
    runtime: node
    buildCommand: cd backend && npm install
    startCommand: cd backend && node --experimental-sqlite server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: DB_PATH
        value: /var/data/nova.db
    disk:
      name: nova-data
      mountPath: /var/data
      sizeGB: 1
