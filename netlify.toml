[build]
  base = "frontend"
  publish = "dist"
  command = "yarn install && yarn build"

[build.environment]
  NODE_VERSION = "20"
  # IMPORTANT: Set VITE_API_URL in Netlify dashboard:
  # Site Settings → Environment Variables → VITE_API_URL
  # Value: https://YOUR-APP-NAME.onrender.com/api

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
